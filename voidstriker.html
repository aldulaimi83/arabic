<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID STRIKER - Physics Fling Shooter | Youooo Games</title>
    <meta name="description" content="VOID STRIKER: Physics-based spaceship fling shooter. Aim and launch your ship, hit all targets to progress through endless levels with particle effects and sound." />
    <link rel="icon" href="youooo_logo.png" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(20, 30, 60, 0.8);
            border: 2px solid rgba(0, 255, 200, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00FFFF 0%, #FF00FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .header p {
            font-size: 0.95em;
            color: #aaa;
            margin-bottom: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: rgba(0, 255, 200, 0.05);
            border: 1px solid rgba(0, 255, 200, 0.2);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label { font-size: 0.75em; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: #00FFFF; margin-top: 5px; }
        .game-wrapper {
            position: relative;
            margin: 20px 0;
        }
        canvas {
            border: 2px solid rgba(0, 255, 200, 0.3);
            border-radius: 10px;
            background: #0a0e27;
            display: block;
            width: 100%;
            max-width: 100%;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00FFFF 0%, #FF00FF 100%);
            color: #000;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4); }
        .btn-secondary {
            background: rgba(0, 255, 200, 0.1);
            color: #00FFFF;
            border: 1px solid rgba(0, 255, 200, 0.3);
        }
        .btn-secondary:hover { background: rgba(0, 255, 200, 0.2); }
        .info {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 255, 200, 0.05);
            border-radius: 10px;
            border-left: 3px solid #00FFFF;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            border: 2px solid rgba(0, 255, 200, 0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        .modal-content h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #00FFFF;
        }
        .modal-content p { font-size: 1.1em; margin-bottom: 10px; color: #aaa; }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .header h1 { font-size: 1.8em; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 VOID STRIKER</h1>
            <p>Aim • Fling • Strike! Physics-based spaceship shooter</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="levelDisplay">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="bestDisplay">0</div>
            </div>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="760" height="600"></canvas>
        </div>

        <div class="info">
            <strong>🎯 How to Play:</strong> Drag from the launcher to aim. Release to fling your ship. Hit all targets to advance. Each level gets harder!
        </div>

        <div class="controls">
            <button class="btn-primary" id="newGameBtn">New Game</button>
            <button class="btn-secondary" onclick="window.location.href='index.html'">Back to Hub</button>
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2>🎮 Game Over</h2>
            <p>Level Reached: <span id="levelReached">1</span></p>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Best Score: <span id="bestScoreModal">0</span></p>
            <button class="btn-primary" id="playAgainBtn" style="width: 100%; margin-top: 20px;">Play Again</button>
            <button class="btn-secondary" onclick="window.location.href='index.html'" style="width: 100%; margin-top: 10px;">Back to Hub</button>
        </div>
    </div>

    <script src="voidstriker.js"></script>
</body>
</html>
